<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DayZero</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div id="countdown-section">
      <canvas id="donut"></canvas>
      <p id="event-label"></p>
    </div>

    <form id="search-form" action="https://www.google.com/search" method="get" target="_self">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" name="q" placeholder="Search Google" autocomplete="off" autofocus />
      </div>
    </form>
  </main>

  <!-- Settings panel -->
  <div id="settings-overlay" class="hidden"></div>
  <div id="settings-panel" class="hidden">
    <h2>Set Countdown</h2>
    <label for="event-name-input">Event name</label>
    <input type="text" id="event-name-input" placeholder="e.g. Trip to Japan" maxlength="40" />
    <label for="date-input">Target date</label>
    <input type="date" id="date-input" />
    <div class="settings-actions">
      <button id="cancel-btn" type="button">Cancel</button>
      <button id="save-btn" type="button">Save</button>
    </div>
  </div>

  <!-- Gear button -->
  <button id="settings-btn" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <script src="newtab.js"></script>
</body>
</html>
